<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Код спасения оранжереи</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0fdf4; touch-action: manipulation; }
        
        /* Базовые анимации появления */
        .fade-in { animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Анимации растений */
        .plant-emoji { 
            font-size: 6rem; 
            display: inline-block; 
            transition: transform 0.3s;
            line-height: 1;
        }
        
        /* Анимация гибели (увядание) */
        .wilt { animation: wiltAnim 1.5s forwards ease-out; }
        @keyframes wiltAnim {
            0% { transform: scale(1) rotate(0deg); filter: grayscale(0%); opacity: 1; }
            40% { transform: scale(0.9) rotate(-15deg); filter: grayscale(30%); }
            100% { transform: scale(0.6) rotate(-35deg) translateY(20px); filter: grayscale(100%); opacity: 0.6; }
        }

        /* Анимация жизни (рост/цветение) */
        .bloom { animation: bloomAnim 1.5s forwards ease-out; }
        @keyframes bloomAnim {
            0% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(74, 222, 128, 0)); }
            50% { transform: scale(1.3) translateY(-10px); filter: drop-shadow(0 0 20px rgba(74, 222, 128, 0.8)); }
            100% { transform: scale(1.2) translateY(-5px); filter: drop-shadow(0 0 10px rgba(74, 222, 128, 0.5)); }
        }
        
        /* Эффект пульсации кнопки */
        .pulse-btn { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-green-50 to-blue-50">

    <div id="app" class="max-w-xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden fade-in border-4 border-green-200">
        <!-- Заголовок -->
        <div class="bg-green-600 text-white p-4 text-center">
            <h1 class="text-2xl font-bold">🌿 Спаси оранжерею!</h1>
        </div>

        <!-- Контент -->
        <div id="content" class="p-6 sm:p-8">
            <!-- JS рендерит сюда -->
        </div>
    </div>

    <script>
        // Упрощенные данные с акцентом на визуал
        const stages = [
            {
                id: 1,
                title: "Лиана сохнет",
                context: "Включи воду! Робот ждёт команду:",
                task: "Нужна пр[...]мая вода",
                options: [
                    { letter: "Я", correct: true, word: "прЯмая", rule: "Проверка: прЯмо", outcome: "Вода пошла! Клетки полны влаги (тургор)." },
                    { letter: "Е", correct: false, word: "прЕмая", rule: "Ошибка!", outcome: "Робот понял «ПРЕрвать». Лиана засохла." }
                ],
                icon: "🌿"
            },
            {
                id: 2,
                title: "Лимон желтеет",
                context: "Нужно железо. Запусти подкормку:",
                task: "Начать п[...]тание",
                options: [
                    { letter: "И", correct: true, word: "пИтание", rule: "Проверка: пИща", outcome: "Раствор подан. Листья снова зелёные!" },
                    { letter: "Я", correct: false, word: "пЯтнение", rule: "Ошибка!", outcome: "Робот лечит «пятна» ядом. Листья сгорели." }
                ],
                icon: "🍋"
            },
            {
                id: 3,
                title: "Перегрев",
                context: "Слишком жарко! Охлади пол:",
                task: "Охладить гла[...]кий пол",
                options: [
                    { letter: "Д", correct: true, word: "глаДкий", rule: "Проверка: глаДенький", outcome: "Охлаждение включено. Климат в норме." },
                    { letter: "Т", correct: false, word: "глаТкий", rule: "Ошибка!", outcome: "Робот пустил жаркий газ. Растение сварилось." }
                ],
                icon: "🌺"
            }
        ];

        let currentStage = 0;
        let results = [];
        const contentDiv = document.getElementById('content');

        function initApp() {
            renderIntro();
        }

        function renderIntro() {
            contentDiv.innerHTML = `
                <div class="text-center">
                    <div class="text-6xl mb-4">🤖⚡</div>
                    <h2 class="text-2xl font-bold text-red-600 mb-2">Авария!</h2>
                    <p class="text-gray-700 mb-6 text-lg">Робот-садовник сломался. Он понимает только текст без ошибок.</p>
                    <div class="bg-yellow-100 border-l-4 border-yellow-500 p-3 text-left mb-6 rounded">
                        <p class="font-bold">Твоя задача:</p>
                        <p>Вставляй правильные буквы. Ошибка убьёт растение!</p>
                    </div>
                    <button onclick="startStages()" class="pulse-btn w-full bg-green-500 hover:bg-green-600 text-white text-xl font-bold py-4 px-6 rounded-2xl transition shadow-lg">
                        Начать спасение 🚀
                    </button>
                </div>
            `;
        }

        function startStages() {
            currentStage = 0;
            results = [];
            renderStage();
        }

        function renderStage() {
            const stage = stages[currentStage];
            contentDiv.innerHTML = `
                <div class="fade-in text-center">
                    <div class="mb-2"><span class="plant-emoji">${stage.icon}</span></div>
                    <h2 class="text-xl font-bold text-gray-800 mb-1">${stage.title}</h2>
                    <p class="text-gray-600 mb-4">${stage.context}</p>
                    
                    <div class="bg-blue-50 border-2 border-blue-200 p-4 rounded-xl mb-6 shadow-inner">
                        <p class="text-2xl font-mono text-gray-800 font-bold">${stage.task}</p>
                    </div>

                    <p class="text-sm text-gray-500 mb-2 font-bold uppercase">Какая буква?</p>
                    <div class="grid grid-cols-2 gap-4">
                        ${stage.options.map((opt, index) => `
                            <button onclick="handleChoice(${index})" class="text-4xl font-bold bg-white border-4 border-gray-200 hover:border-green-400 hover:bg-green-50 text-gray-800 py-6 rounded-2xl transition-all active:scale-95 shadow-md">
                                ${opt.letter}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function handleChoice(optionIndex) {
            const stage = stages[currentStage];
            const choice = stage.options[optionIndex];
            
            results.push({ correct: choice.correct });

            const statusColor = choice.correct ? "text-green-600" : "text-red-600";
            const animClass = choice.correct ? "bloom" : "wilt";
            const bgStatus = choice.correct ? "bg-green-50 border-green-300" : "bg-red-50 border-red-300";

            contentDiv.innerHTML = `
                <div class="fade-in text-center">
                    <div class="mb-4 h-32 flex items-center justify-center">
                        <span class="plant-emoji ${animClass}">${stage.icon}</span>
                    </div>
                    
                    <h2 class="text-3xl font-bold ${statusColor} mb-1">${choice.word}</h2>
                    <p class="text-gray-500 font-bold mb-4">${choice.rule}</p>
                    
                    <div class="${bgStatus} border-2 p-4 rounded-xl mb-6">
                        <p class="text-lg font-semibold text-gray-800">${choice.outcome}</p>
                    </div>

                    <button onclick="nextStage()" class="w-full bg-blue-500 hover:bg-blue-600 text-white text-xl font-bold py-4 px-6 rounded-2xl transition shadow-lg active:scale-95">
                        ${currentStage < stages.length - 1 ? "Дальше ➡️" : "Итоги 📊"}
                    </button>
                </div>
            `;
        }

        function nextStage() {
            currentStage++;
            if (currentStage < stages.length) {
                renderStage();
            } else {
                renderResults();
            }
        }

        function renderResults() {
            const score = results.filter(r => r.correct).length;
            const isPerfect = score === stages.length;
            
            let resultEmoji = "🏆";
            let resultText = "Оранжерея спасена!";
            let resultColor = "text-green-600";
            
            if (score === 0) { resultEmoji = "🥀"; resultText = "Всё засохло..."; resultColor = "text-red-600"; }
            else if (score < stages.length) { resultEmoji = "🩹"; resultText = "Некоторые растения пострадали."; resultColor = "text-yellow-600"; }

            contentDiv.innerHTML = `
                <div class="fade-in text-center">
                    <div class="text-7xl mb-4">${resultEmoji}</div>
                    <h2 class="text-3xl font-bold ${resultColor} mb-2">${resultText}</h2>
                    <p class="text-xl mb-6">Счёт: <span class="font-bold">${score} из ${stages.length}</span></p>
                    
                    <div class="bg-blue-50 border-2 border-blue-200 p-4 rounded-xl mb-6 text-left">
                        <p class="font-bold text-blue-800">Вывод учёного:</p>
                        <p class="text-blue-900">Орфография важна! Ошибка в одной букве полностью меняет команду для компьютера.</p>
                    </div>

                    <button onclick="startStages()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 text-xl font-bold py-4 px-6 rounded-2xl transition shadow-sm active:scale-95">
                        🔄 Попробовать ещё раз
                    </button>
                </div>
            `;
        }

        initApp();
    </script>
</body>
</html>
